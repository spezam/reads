<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Matteo Ridolfi</title>
    <style>
      :root {
        --accent: #8487af;
        --muted: #aaa;
        --font: Menlo, Monaco, 'Lucida Console', 'Liberation Mono', 'DejaVu Sans Mono', monospace;
      }

      * {
        margin: 0;
        box-sizing: border-box;
      }

      body {
        font: 13px/1.6 var(--font);
      }

      .logo {
        position: fixed;
        top: 24px;
        left: 48px;
        color: var(--accent);
      }

      .home {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 80px 48px;
      }

      a {
        color: var(--accent);
        text-decoration: none;
        -webkit-tap-highlight-color: transparent;
      }

      a:hover {
        color: #fff;
        background: var(--accent);
      }

      .book {
        margin-bottom: 1.4em;
      }

      .year {
        color: var(--muted);
        margin-top: 1.2em;
        margin-bottom: 0.4em;
      }

      .rating {
        color: var(--accent);
        opacity: 0.5;
        margin-left: 6px;
      }

      .loading {
        color: var(--muted);
      }
    </style>
  </head>

  <body>
    <div class="logo">:wq</div>

    <div class="home">
      <div id="books">
        <div v-if="loading" class="loading">...</div>
        <template v-else>
          <div v-for="(b, i) in bookdata" :key="i" class="book">
            <div v-if="!singleYear && (i === 0 || year(bookdata[i-1]) !== year(b))" class="year">-- {{ year(b) }} --</div>
            <a :href="b.link" target="_blank" rel="noopener">{{ b.title }} __ {{ b.author }}</a><span class="rating"><span v-for="n in b.rating">x</span></span>
          </div>
        </template>
      </div>
    </div>

    <script src="https://unpkg.com/vue@3.5.29/dist/vue.global.prod.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.11.0/axios.min.js"></script>
    <script src="main.js"></script>
  </body>
</html>
